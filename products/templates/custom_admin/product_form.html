<!DOCTYPE html>
<html>
<head>
    <title>Add / Edit Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    

<div class="container mt-5">
    <button onclick="history.back()" class="btn btn-secondary mb-3">
    ⬅ Back
</button>

    <h2>➕ Add / Edit Product</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Product Name</label>
            <input type="text" name="name" class="form-control"
                   value="{{ product.name|default:'' }}" required>
        </div>

        <div class="mb-3">
    <label>Category</label>

    <input list="categoryList" name="category_name"
           class="form-control"
           placeholder="Type or select category"
           value="{{ product.category.name|default:'' }}" required>

    <datalist id="categoryList">
        {% for cat in categories %}
            <option value="{{ cat.name }}">
        {% endfor %}
    </datalist>
</div>

        <div class="mb-3">
    <label>Brand</label>

    <input list="brandList" name="brand_name"
           class="form-control"
           placeholder="Type or select brand"
           value="{{ product.brand.name|default:'' }}" required>

    <datalist id="brandList">
        {% for b in brands %}
            <option value="{{ b.name }}">
        {% endfor %}
    </datalist>
</div>

        <div class="mb-3">
            <label>Aisle</label>
            <input type="number" name="aisle" class="form-control"
                   value="{{ product.aisle|default:'' }}" required>
        </div>

        <div class="mb-3">
            <label>Rack</label>
            <input type="text" name="rack" class="form-control"
                   value="{{ product.rack|default:'' }}" required>
        </div>

        <div class="mb-3">
            <label>Stock</label>
            <input type="number" name="stock" class="form-control"
                   value="{{ product.stock_quantity|default:'' }}" required>
        </div>

        <button class="btn btn-success">Save</button>

    </form>

</div>

</body>
</html>
